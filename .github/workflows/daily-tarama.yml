name: Daily BIST Tarama

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - daily-tarama

permissions:
  contents: write

jobs:
  run-tarama:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Istanbul
      TV_USERNAME: ${{ secrets.TV_USERNAME }}
      TV_PASSWORD: ${{ secrets.TV_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tarama
        run: python tarama.py

      - name: Commit updated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "*.xlsx"
          if git diff --cached --quiet; then
            echo "No Excel changes to commit."
          else
            git commit -m "Update daily BIST tracking Excel"
            git push
          fi
